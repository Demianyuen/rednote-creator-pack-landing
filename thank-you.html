<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Invoice Request Sent - RedNote Creator Pack</title>
    <meta name="robots" content="noindex">
    <style>
      :root {
        --ink: #1d2027;
        --muted: #5d6472;
        --line: #d8dce3;
        --paper: #fbfaf7;
        --panel: #ffffff;
        --accent: #d93a2f;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: var(--paper);
        color: var(--ink);
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        line-height: 1.55;
      }

      main {
        width: min(680px, calc(100vw - 32px));
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--panel);
        padding: 28px;
      }

      h1 {
        margin: 0;
        font-size: clamp(32px, 6vw, 56px);
        line-height: 1;
        letter-spacing: 0;
      }

      p {
        color: var(--muted);
      }

      .button {
        min-height: 48px;
        border-radius: 8px;
        border: 1px solid var(--accent);
        background: var(--accent);
        color: white;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        padding: 12px 18px;
        text-decoration: none;
        font-weight: 800;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Invoice request sent.</h1>
      <p>
        Thanks. A PayPal or Stripe invoice will be sent before processing starts. Delivery is by email after payment.
      </p>
      <p>
        If this is the first FormSubmit request for the support inbox, check the confirmation email once to activate delivery.
      </p>
      <p>
        <a class="button" href="./">Back to Creator Pack</a>
      </p>
    </main>
  </body>
</html>
